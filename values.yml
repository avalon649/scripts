additionalArguments:
 - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
 - --certificatesresolvers.cloudflare.acme.email=admin@kore-link.net
 - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1
 - --certificatesresolvers.cloudflare.acme.storage=/ssl-certs/acme-cloudflare.json

logs:
  general:
    level: ERROR
    
ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    http:
      tls:
        enabled: true
        certResolver: cloudflare
  
env:
  - name: CF_API_EMAIL
    valueFrom:
      secretKeyRef:
        key: email
        name: cloudflare-credentials
  - name: CF_API_KEY
    valueFrom:
      secretKeyRef:
        key: apiKey
        name: cloudflare-credentials

# Disable Dashboard
ingressRoute:
  dashboard:
    enabled: false 

persistence:
  enabled: true
  name: ssl-certs
  size: 1Gi
  path: /ssl-certs

